{% extends "base.html" %}
{% block title %}{{ action }} un produit{% endblock %}

{% block content %}
<h1>{{ action }} un produit</h1>

<div class="card" style="max-width:520px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">{{ action }}</button>
    </form>
</div>
{% endblock %}
