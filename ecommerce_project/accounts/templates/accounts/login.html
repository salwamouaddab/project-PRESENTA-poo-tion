{% extends "base.html" %}
{% block title %}Connexion{% endblock %}

{% block content %}
<div class="card" style="max-width:420px; margin:0 auto;">
    <h1>Connexion</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Se connecter</button>
    </form>
    <p style="margin-top:1rem;">
        Pas encore de compte ? <a href="{% url 'accounts:choose_role' %}">Créer un compte</a>
    </p>
</div>
{% endblock %}
