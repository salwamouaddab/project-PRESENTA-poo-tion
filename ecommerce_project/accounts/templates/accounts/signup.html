{% extends "base.html" %}
{% block title %}Inscription {{ role }}{% endblock %}

{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
    <h1>Créer un compte {{ role }}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Créer mon compte</button>
    </form>
    <p style="margin-top:1rem;">
        Déjà un compte ? <a href="{% url 'accounts:login' %}">Se connecter</a>
    </p>
</div>
{% endblock %}
